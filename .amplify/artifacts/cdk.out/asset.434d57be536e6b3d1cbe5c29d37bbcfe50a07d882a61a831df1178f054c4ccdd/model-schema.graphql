type UserProfile @model @auth(rules: [{allow: owner, ownerField: "userId", identityClaim: "sub"},
  {allow: groups, operations: [read, update, delete], groups: ["ADMINS"]}])
{
  userId: ID! @primaryKey
  displayName: String!
  email: AWSEmail
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Group @model @auth(rules: [{allow: groups, groups: ["ADMINS", "LEADERS"]},
  {allow: private, operations: [read]}])
{
  groupId: ID! @primaryKey @auth(rules: [{allow: groups, groups: ["ADMINS", "LEADERS"]},
  {allow: private, operations: [read]}])
  name: String! @auth(rules: [{allow: groups, groups: ["ADMINS", "LEADERS"]},
  {allow: private, operations: [read]}])
  joinCodeHash: String @index(queryField: "listGroupByJoinCodeHash") @auth(rules: [{allow: groups, operations: [read, create, update], groups: ["ADMINS", "LEADERS"]}])
  activeProgramId: String
  createdByUserId: String! @auth(rules: [{allow: groups, groups: ["ADMINS", "LEADERS"]},
  {allow: private, operations: [read]}])
  leaderUserIds: [String]
  createdAt: AWSDateTime! @auth(rules: [{allow: groups, groups: ["ADMINS", "LEADERS"]},
  {allow: private, operations: [read]}])
  updatedAt: AWSDateTime! @auth(rules: [{allow: groups, groups: ["ADMINS", "LEADERS"]},
  {allow: private, operations: [read]}])
}

type GroupMembership @model @auth(rules: [{allow: owner, ownerField: "userId", identityClaim: "sub"},
  {allow: groups, operations: [read, create, update, delete], groups: ["ADMINS", "LEADERS"]}])
{
  membershipId: ID! @primaryKey
  groupId: ID! @index(queryField: "listGroupMembershipByGroupId")
  userId: ID! @index(queryField: "listGroupMembershipByUserId")
  role: GroupMembershipRole
  displayName: String!
  joinedAt: AWSDateTime!
}

type ProgramSnapshot @model @auth(rules: [{allow: private, operations: [read]},
  {allow: groups, operations: [create, read, update, delete], groups: ["ADMINS", "LEADERS"]}])
{
  programId: ID! @primaryKey
  groupId: ID! @index(queryField: "listProgramSnapshotByGroupId")
  title: String!
  version: String!
  contentHash: String!
  content: AWSJSON!
  publishedByUserId: String!
  publishedAt: AWSDateTime!
}

type SectionProgress @model @auth(rules: [{allow: owner, ownerField: "userId", identityClaim: "sub"},
  {allow: groups, operations: [read, delete], groups: ["ADMINS"]}])
{
  progressId: ID! @primaryKey
  userId: ID! @index(queryField: "listSectionProgressByUserId")
  groupId: ID! @index(queryField: "listSectionProgressByGroupId")
  programId: ID! @index(queryField: "listSectionProgressByProgramId")
  weekNumber: Int!
  dayNumber: Int!
  sectionId: String!
  completed: Boolean!
  pointsEarned: Int!
  updatedAt: AWSDateTime!
}

type EncryptedAnswer @model @auth(rules: [{allow: owner, ownerField: "userId", identityClaim: "sub"}])
{
  answerId: ID! @primaryKey
  userId: ID! @index(queryField: "listEncryptedAnswerByUserId")
  groupId: ID! @index(queryField: "listEncryptedAnswerByGroupId")
  programId: ID! @index(queryField: "listEncryptedAnswerByProgramId")
  weekNumber: Int!
  dayNumber: Int!
  sectionId: String!
  promptId: String!
  ciphertext: String!
  iv: String!
  salt: String!
  keyDerivation: String!
  iterations: Int!
  algorithm: String!
  version: Int!
  updatedAt: AWSDateTime!
}

type UserScore @model @auth(rules: [{allow: private, operations: [read]},
  {allow: owner, operations: [create, update, delete, read], ownerField: "userId", identityClaim: "sub"},
  {allow: groups, operations: [read], groups: ["ADMINS", "LEADERS"]}])
{
  scoreId: ID! @primaryKey
  userId: ID! @index(queryField: "listUserScoreByUserId")
  groupId: ID! @index(queryField: "listUserScoreByGroupId")
  programId: ID!
  displayName: String!
  weekNumber: Int!
  weeklyScore: Int!
  cumulativeScore: Int!
  updatedAt: AWSDateTime!
}

type LeaderMetric @model @auth(rules: [{allow: groups, operations: [read, create, update, delete], groups: ["ADMINS", "LEADERS"]}])
{
  metricId: ID! @primaryKey
  groupId: ID! @index(queryField: "listLeaderMetricByGroupId")
  programId: ID!
  memberCount: Int!
  activeMemberCount: Int!
  cumulativeCompletionCount: Int!
  updatedAt: AWSDateTime!
}

enum GroupMembershipRole {
  member
  leader
  admin
}